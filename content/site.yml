# 首页横幅大合照（打开网站第一眼看到的图）
hero:
  enable: true
  image: https://drive.zichenccc.cn/raw/班级blog/合照-2026百日誓师.webp
  title: 26届4班纪念站
  subtitle: 愿此去繁花似锦，再相逢依旧如故
  mask_alpha: 0.35      # 0-1，黑色蒙版透明度，图越亮调越高
  height: 70            # 屏幕高度百分比 0-100

footer_html: ""

