# 协议弹窗：协议正文在 content/pages/用户协议.md 与 免责声明.md
# 正文内容变化时，hash 自动变化，访客需重新同意
agreement:
  enable: true
  storage_key: site_agreement_v1
  countdown_seconds: 7
  pages: [用户协议, 免责声明]

gallery:
  enable: true
  title: 班级图库

