# docker-compose for ClassMemorial
# иө„жәҗеҚ з”ЁпјҡbackendвүҲ150MB + nginxвүҲ10MB вүҲ 200MB RAMпјҢйҖӮй…Қ 2H2G дёҺ astrbot е…ұеӯҳ
services:
  backend:
    build: ./backend
    container_name: classmemorial-backend
    env_file: .env
    volumes:
      - content:/app/content        # git д»“еә“пјҡposts/pages/gallery/site.ymlпјҲеӨҮд»ҪеҲ° GitHubпјү
      - site:/app/data/site         # з”ҹжҲҗзҡ„йқҷжҖҒз«ҷпјҲдёҺ nginx е…ұдә«пјү
      - dbdata:/app/data            # data.db зӯүпјҲйў„з•ҷпјү
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 384m
    networks: [cmnet]

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: classmemorial-nginx
    ports:
      - "80:80"
    volumes:
      - site:/usr/share/nginx/html/site:ro
    depends_on:
      - backend
    restart: unless-stopped
    mem_limit: 64m
    networks: [cmnet]

volumes:
  content:
  site:
  dbdata:

networks:
  cmnet:
